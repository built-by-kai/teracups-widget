<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Tera Cup</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: transparent;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #e8e8e8;
  --muted: rgba(255,255,255,0.28);
  --lime: #c8f542;
  --sky: #7dd3fc;
  --green: #6ee7b7;
  --rose: #fca5a5;
  --amber: #fcd34d;
}

@media (prefers-color-scheme: light) {
  :root {
    --card: rgba(0,0,0,0.04);
    --border: rgba(0,0,0,0.08);
    --text: #111;
    --muted: rgba(0,0,0,0.35);
    --lime: #5a8a00;
    --sky: #0369a1;
    --green: #047857;
    --rose: #b91c1c;
    --amber: #92400e;
  }
}

html {
  color-scheme: dark light;
  background: var(--bg);
}

body {
  background: transparent;
  color: var(--text);
  font-family: 'Geist', sans-serif;
  font-size: 13px;
}

.w {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.kpi {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}

.kpi-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.kpi-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dot-lime  { background: var(--lime); }
.dot-sky   { background: var(--sky); }
.dot-green { background: var(--green); }
.dot-rose  { background: var(--rose); }

.kpi-val {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 5px;
}

.kpi-val.lime  { color: var(--lime); }
.kpi-val.sky   { color: var(--sky); }
.kpi-val.green { color: var(--green); }
.kpi-val.rose  { color: var(--rose); }

.kpi-sub {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--muted);
}

.bottom-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.panel-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.badge {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  padding: 1px 7px;
  border-radius: 20px;
  background: rgba(200,245,66,0.1);
  color: var(--lime);
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
}
.bar-row:last-child { border-bottom: none; }

.bar-label {
  font-size: 11px;
  color: var(--muted);
  width: 90px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bar-track {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.9s cubic-bezier(0.16,1,0.3,1);
}

.bar-n {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  width: 14px;
  text-align: right;
  flex-shrink: 0;
}

.att-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
}
.att-row:last-child { border-bottom: none; }

.att-info { flex: 1; min-width: 0; }

.att-name {
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.att-co {
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
}

.pill {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}

.pill-rose  { background: rgba(252,165,165,0.12); color: var(--rose); }
.pill-amber { background: rgba(252,211,77,0.12);  color: var(--amber); }

.empty {
  padding: 20px 14px;
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-align: center;
}

.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.ts {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--muted);
}

.btn {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 20px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.btn:hover { opacity: 0.7; }
</style>
</head>
<body>
<div class="w">

  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-top">
        <div class="kpi-label">Pipeline Value</div>
        <div class="dot dot-lime"></div>
      </div>
      <div class="kpi-val lime" id="v-pipeline">—</div>
      <div class="kpi-sub" id="s-pipeline">active deals</div>
    </div>
    <div class="kpi">
      <div class="kpi-top">
        <div class="kpi-label">Active Deals</div>
        <div class="dot dot-sky"></div>
      </div>
      <div class="kpi-val sky" id="v-active">—</div>
      <div class="kpi-sub" id="s-active">in pipeline</div>
    </div>
    <div class="kpi">
      <div class="kpi-top">
        <div class="kpi-label">Won This Month</div>
        <div class="dot dot-green"></div>
      </div>
      <div class="kpi-val green" id="v-won">—</div>
      <div class="kpi-sub" id="s-won">closed</div>
    </div>
    <div class="kpi">
      <div class="kpi-top">
        <div class="kpi-label">Needs Attention</div>
        <div class="dot dot-rose"></div>
      </div>
      <div class="kpi-val rose" id="v-att">—</div>
      <div class="kpi-sub">overdue follow-ups</div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="panel">
      <div class="panel-head">
        By Stage
        <span class="badge" id="b-stage">—</span>
      </div>
      <div id="funnel"><div class="empty">Loading...</div></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        Needs Attention
        <span class="badge" id="b-att">—</span>
      </div>
      <div id="attention"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <div class="footer">
    <div class="ts" id="ts">—</div>
    <button class="btn" onclick="load()">↻ Refresh</button>
  </div>

</div>
<script>
const DB    = '35c8b289e31a8223925981d295b8d721';
const TOKEN = 'ntn_M79742547174mXMZHHPnekbvFQCTHMnVhPn4XL4pYNYfhA';

const STAGES = ['Lead','Contacted','Qualified','Proposal Sent','Negotiation'];
const COLORS = {
  'Lead':         '#666',
  'Contacted':    '#7dd3fc',
  'Qualified':    '#fcd34d',
  'Proposal Sent':'#c8f542',
  'Negotiation':  '#a78bfa',
};

function rm(v) {
  if (!v && v !== 0) return '—';
  if (v >= 1000000) return 'RM' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1000)    return 'RM' + (v/1000).toFixed(1) + 'K';
  return 'RM' + v.toLocaleString();
}

async function fetchAll() {
  let all = [], cursor;
  while (true) {
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const r = await fetch(`https://api.notion.com/v1/databases/${DB}/query`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${TOKEN}`,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!d.results) break;
    all = all.concat(d.results);
    if (!d.has_more) break;
    cursor = d.next_cursor;
  }
  return all;
}

function parse(pages) {
  return pages.map(p => {
    const pr = p.properties;
    return {
      name:          pr['Name']?.title?.[0]?.plain_text || '—',
      company:       pr['Company']?.rich_text?.[0]?.plain_text || '',
      funnel:        pr['Funnel']?.status?.name || '',
      orderValue:    pr['Order Value']?.number || 0,
      nextFollowup:  pr['Next Follow-up']?.date?.start || null,
      lastContacted: pr['Last Contacted']?.date?.start || null,
      needsAttention:pr['Needs Attention?']?.formula?.boolean || false,
    };
  });
}

function render(records) {
  const now    = new Date();
  const mStart = new Date(now.getFullYear(), now.getMonth(), 1);

  const active   = records.filter(r => r.funnel !== 'Closed-Won' && r.funnel !== 'Closed-Lost');
  const wonMonth = records.filter(r => r.funnel === 'Closed-Won' && r.lastContacted && new Date(r.lastContacted) >= mStart);
  const att      = records.filter(r =>
    r.needsAttention ||
    (r.nextFollowup && new Date(r.nextFollowup) < now && r.funnel !== 'Closed-Won' && r.funnel !== 'Closed-Lost')
  );

  const pipeVal = active.reduce((s,r) => s + r.orderValue, 0);
  const wonVal  = wonMonth.reduce((s,r) => s + r.orderValue, 0);

  document.getElementById('v-pipeline').textContent = rm(pipeVal);
  document.getElementById('s-pipeline').textContent = `${active.length} active deal${active.length!==1?'s':''}`;
  document.getElementById('v-active').textContent   = active.length;
  document.getElementById('s-active').textContent   = `${records.length} total records`;
  document.getElementById('v-won').textContent      = rm(wonVal);
  document.getElementById('s-won').textContent      = `${wonMonth.length} deal${wonMonth.length!==1?'s':''} closed`;
  document.getElementById('v-att').textContent      = att.length;

  // Funnel
  const sc = {};
  STAGES.forEach(s => sc[s] = 0);
  active.forEach(r => { if (sc[r.funnel] !== undefined) sc[r.funnel]++; });
  const maxS  = Math.max(...Object.values(sc), 1);
  const total = Object.values(sc).reduce((a,b)=>a+b,0);
  document.getElementById('b-stage').textContent = total;
  document.getElementById('funnel').innerHTML = STAGES.map(s => `
    <div class="bar-row">
      <div class="bar-label">${s}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(sc[s]/maxS)*100}%;background:${COLORS[s]}"></div></div>
      <div class="bar-n">${sc[s]}</div>
    </div>
  `).join('');

  // Attention
  document.getElementById('b-att').textContent = att.length;
  if (att.length === 0) {
    document.getElementById('attention').innerHTML = '<div class="empty">✓ All clear</div>';
  } else {
    document.getElementById('attention').innerHTML = att.slice(0,6).map(r => {
      const diff = r.nextFollowup ? Math.round((now - new Date(r.nextFollowup)) / 86400000) : 0;
      const pillClass = diff > 2 ? 'pill-rose' : 'pill-amber';
      const label     = diff > 0 ? `${diff}d overdue` : 'today';
      return `
        <div class="att-row">
          <div class="att-info">
            <div class="att-name">${r.name}</div>
            ${r.company ? `<div class="att-co">${r.company}</div>` : ''}
          </div>
          <span class="pill ${pillClass}">${label}</span>
        </div>`;
    }).join('');
  }

  const t = new Date();
  document.getElementById('ts').textContent =
    t.toLocaleDateString('en-MY',{day:'numeric',month:'short'}) + ' · ' +
    t.toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});
}

async function load() {
  try {
    render(parse(await fetchAll()));
  } catch(e) {
    render([
      {name:'Ahmad Firdaus',company:'Kopi Satu',funnel:'Negotiation',orderValue:12500,nextFollowup:new Date(Date.now()-86400000).toISOString(),lastContacted:new Date().toISOString(),needsAttention:true},
      {name:'Siti Nurhaliza',company:'Café Mentari',funnel:'Proposal Sent',orderValue:8200,nextFollowup:new Date(Date.now()+86400000).toISOString(),lastContacted:new Date().toISOString(),needsAttention:false},
      {name:'Raj Kumar',company:'TehTarik Express',funnel:'Qualified',orderValue:5800,nextFollowup:new Date(Date.now()-2*86400000).toISOString(),lastContacted:new Date().toISOString(),needsAttention:true},
      {name:'Mei Ling',company:'Bubble Co.',funnel:'Contacted',orderValue:3400,nextFollowup:new Date(Date.now()+2*86400000).toISOString(),lastContacted:new Date().toISOString(),needsAttention:false},
      {name:'Zulkifli',company:'Restoran Warisan',funnel:'Lead',orderValue:6700,nextFollowup:new Date(Date.now()+3*86400000).toISOString(),lastContacted:new Date().toISOString(),needsAttention:false},
      {name:'Priya Pillai',company:'Smoothie Bar',funnel:'Closed-Won',orderValue:9100,nextFollowup:null,lastContacted:new Date().toISOString(),needsAttention:false},
      {name:'Hafiz Azman',company:'Makan Corner',funnel:'Closed-Won',orderValue:4500,nextFollowup:null,lastContacted:new Date().toISOString(),needsAttention:false},
    ]);
  }
}

load();
</script>
</body>
</html>
