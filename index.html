<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tera Cup Sales</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html { background: #0d0d0d; }
body {
  background: #0d0d0d;
  color: #e8e8e8;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  padding: 0;
}

.widget {
  background: #0d0d0d;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 16px;
}

/* KPI ROW */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.kpi {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 14px 16px;
  backdrop-filter: blur(10px);
}

.kpi-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.kpi-value {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 4px;
}

.kpi-sub {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.3);
}

.kpi-value.lime { color: #c8f542; }
.kpi-value.sky { color: #7dd3fc; }
.kpi-value.emerald { color: #6ee7b7; }
.kpi-value.rose { color: #fca5a5; }

/* STATUS INDICATOR — contained, no overflow */
.kpi-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-dot.lime { background: #c8f542; }
.status-dot.sky { background: #7dd3fc; }
.status-dot.emerald { background: #6ee7b7; }
.status-dot.rose { background: #fca5a5; }

/* TWO COL */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.panel {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.panel-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 12px 14px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* FUNNEL BARS */
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.bar-row:last-child { border-bottom: none; }

.bar-name {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  width: 88px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bar-track {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.07);
  border-radius: 2px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
}

.bar-count {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  width: 16px;
  text-align: right;
  flex-shrink: 0;
}

/* ATTENTION LIST */
.attention-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.attention-row:last-child { border-bottom: none; }

.att-name {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.att-company {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  margin-top: 1px;
}

.pill {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}

.pill-rose { background: rgba(252,165,165,0.1); color: #fca5a5; }
.pill-sky { background: rgba(125,211,252,0.1); color: #7dd3fc; }
.pill-amber { background: rgba(252,211,77,0.1); color: #fcd34d; }
.pill-lime { background: rgba(200,245,66,0.1); color: #c8f542; }
.pill-gray { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); }
.pill-emerald { background: rgba(110,231,183,0.1); color: #6ee7b7; }

/* FULL TABLE */
.table-panel {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.tbl {
  width: 100%;
  border-collapse: collapse;
}

.tbl thead th {
  padding: 10px 14px;
  text-align: left;
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  white-space: nowrap;
  font-weight: 400;
}

.tbl tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.12s;
}
.tbl tbody tr:last-child { border-bottom: none; }
.tbl tbody tr:hover { background: rgba(255,255,255,0.03); }

.tbl td {
  padding: 9px 14px;
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
}

.tbl td.mono {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
}

.tbl td.value {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: #c8f542;
}

.product-chip {
  display: inline-block;
  font-size: 9px;
  font-family: 'Geist Mono', monospace;
  padding: 2px 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.4);
  margin-right: 3px;
  border: 1px solid rgba(255,255,255,0.07);
}

.overdue { color: #fca5a5 !important; }
.today { color: #fcd34d !important; }
.soon { color: rgba(255,255,255,0.6) !important; }

.empty {
  padding: 20px 14px;
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  text-align: center;
}

.refresh-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 4px;
}

.ts {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.2);
}

.refresh-btn {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 3px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}
.refresh-btn:hover { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.15); }
</style>
</head>
<body>
<div class="widget">

  <div class="refresh-row">
    <div class="ts" id="ts">—</div>
    <button class="refresh-btn" onclick="load()">↻ Refresh</button>
  </div>

  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-header">
        <div class="kpi-label">Pipeline Value</div>
        <div class="status-dot lime"></div>
      </div>
      <div class="kpi-value lime" id="kpi-pipeline">—</div>
      <div class="kpi-sub" id="kpi-pipeline-sub">active deals</div>
    </div>
    <div class="kpi">
      <div class="kpi-header">
        <div class="kpi-label">Active Deals</div>
        <div class="status-dot sky"></div>
      </div>
      <div class="kpi-value sky" id="kpi-active">—</div>
      <div class="kpi-sub" id="kpi-active-sub">in pipeline</div>
    </div>
    <div class="kpi">
      <div class="kpi-header">
        <div class="kpi-label">Won This Month</div>
        <div class="status-dot emerald"></div>
      </div>
      <div class="kpi-value emerald" id="kpi-won">—</div>
      <div class="kpi-sub" id="kpi-won-sub">closed</div>
    </div>
    <div class="kpi">
      <div class="kpi-header">
        <div class="kpi-label">Needs Attention</div>
        <div class="status-dot rose"></div>
      </div>
      <div class="kpi-value rose" id="kpi-att">—</div>
      <div class="kpi-sub">overdue follow-ups</div>
    </div>
  </div>

  <div class="two-col">
    <div class="panel">
      <div class="panel-label">By Stage</div>
      <div id="funnel-content"><div class="empty">Loading...</div></div>
    </div>
    <div class="panel">
      <div class="panel-label">Needs Attention</div>
      <div id="att-content"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <div class="table-panel">
    <table class="tbl">
      <thead>
        <tr>
          <th>Lead</th>
          <th>Stage</th>
          <th>Product</th>
          <th>Value</th>
          <th>Source</th>
          <th>Follow-up</th>
          <th>Rep</th>
        </tr>
      </thead>
      <tbody id="tbl-body">
        <tr><td colspan="7"><div class="empty">Loading...</div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const DB = '35c8b289e31a8223925981d295b8d721';
const TOKEN = 'ntn_M79742547174mXMZHHPnekbvFQCTHMnVhPn4XL4pYNYfhA';

const STAGE_COLOR = {
  'Lead': 'rgba(255,255,255,0.3)',
  'Contacted': '#7dd3fc',
  'Qualified': '#fcd34d',
  'Proposal Sent': '#c8f542',
  'Negotiation': '#a78bfa',
  'Closed-Won': '#6ee7b7',
  'Closed-Lost': '#fca5a5'
};

const STAGE_PILL = {
  'Lead': 'pill-gray',
  'Contacted': 'pill-sky',
  'Qualified': 'pill-amber',
  'Proposal Sent': 'pill-lime',
  'Negotiation': 'pill-gray',
  'Closed-Won': 'pill-emerald',
  'Closed-Lost': 'pill-rose'
};

function rm(v) {
  if (!v && v !== 0) return '—';
  if (v >= 1000000) return 'RM' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1000) return 'RM' + (v/1000).toFixed(1) + 'K';
  return 'RM' + v.toLocaleString();
}

function fdate(s) {
  if (!s) return '<span class="mono">—</span>';
  const d = new Date(s), now = new Date();
  const diff = Math.round((d - now) / 86400000);
  if (diff < 0) return `<span class="overdue">${Math.abs(diff)}d overdue</span>`;
  if (diff === 0) return `<span class="today">Today</span>`;
  if (diff <= 3) return `<span class="soon">${diff}d</span>`;
  return `<span class="mono">${d.toLocaleDateString('en-MY',{day:'numeric',month:'short'})}</span>`;
}

async function fetchAll() {
  let all = [], cursor = undefined;
  while (true) {
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const r = await fetch(`https://api.notion.com/v1/databases/${DB}/query`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${TOKEN}`,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!d.results) break;
    all = all.concat(d.results);
    if (!d.has_more) break;
    cursor = d.next_cursor;
  }
  return all;
}

function parse(pages) {
  return pages.map(p => {
    const pr = p.properties;
    const get = (k, t) => {
      const prop = pr[k];
      if (!prop) return null;
      if (t === 'title') return prop.title?.[0]?.plain_text || null;
      if (t === 'text') return prop.rich_text?.[0]?.plain_text || null;
      if (t === 'number') return prop.number ?? null;
      if (t === 'select') return prop.select?.name || null;
      if (t === 'multi') return prop.multi_select?.map(x => x.name) || [];
      if (t === 'date') return prop.date?.start || null;
      if (t === 'status') return prop.status?.name || null;
      if (t === 'formula') return prop.formula?.boolean ?? prop.formula?.string ?? null;
      return null;
    };
    return {
      name: get('Name', 'title'),
      company: get('Company', 'text'),
      funnel: get('Funnel', 'status'),
      orderValue: get('Order Value', 'number'),
      source: get('Source', 'select'),
      nextFollowup: get('Next Follow-up', 'date'),
      lastContacted: get('Last Contacted', 'date'),
      salesRep: get('Sales Rep Assigned', 'select'),
      products: get('Product Interest', 'multi'),
      needsAttention: get('Needs Attention?', 'formula')
    };
  });
}

function render(records) {
  const now = new Date();
  const mStart = new Date(now.getFullYear(), now.getMonth(), 1);

  const active = records.filter(r => r.funnel !== 'Closed-Won' && r.funnel !== 'Closed-Lost');
  const won = records.filter(r => r.funnel === 'Closed-Won');
  const wonMonth = won.filter(r => r.lastContacted && new Date(r.lastContacted) >= mStart);
  const att = records.filter(r =>
    r.needsAttention === true ||
    (r.nextFollowup && new Date(r.nextFollowup) < now && r.funnel !== 'Closed-Won' && r.funnel !== 'Closed-Lost')
  );

  const pipeVal = active.reduce((s,r) => s + (r.orderValue||0), 0);
  const wonVal = wonMonth.reduce((s,r) => s + (r.orderValue||0), 0);

  document.getElementById('kpi-pipeline').textContent = rm(pipeVal);
  document.getElementById('kpi-pipeline-sub').textContent = `${active.length} active deal${active.length!==1?'s':''}`;
  document.getElementById('kpi-active').textContent = active.length;
  document.getElementById('kpi-active-sub').textContent = `${records.length} total records`;
  document.getElementById('kpi-won').textContent = rm(wonVal);
  document.getElementById('kpi-won-sub').textContent = `${wonMonth.length} deal${wonMonth.length!==1?'s':''} closed`;
  document.getElementById('kpi-att').textContent = att.length;

  // Funnel
  const stages = ['Lead','Contacted','Qualified','Proposal Sent','Negotiation'];
  const sc = {};
  stages.forEach(s => sc[s] = 0);
  active.forEach(r => { if (sc[r.funnel] !== undefined) sc[r.funnel]++; });
  const maxS = Math.max(...Object.values(sc), 1);

  document.getElementById('funnel-content').innerHTML = stages.map(s => `
    <div class="bar-row">
      <div class="bar-name">${s}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(sc[s]/maxS)*100}%;background:${STAGE_COLOR[s]}"></div></div>
      <div class="bar-count">${sc[s]}</div>
    </div>
  `).join('');

  // Attention
  if (att.length === 0) {
    document.getElementById('att-content').innerHTML = '<div class="empty" style="color:rgba(110,231,183,0.5)">✓ All clear</div>';
  } else {
    document.getElementById('att-content').innerHTML = att.slice(0,6).map(r => {
      const diff = r.nextFollowup ? Math.round((now - new Date(r.nextFollowup)) / 86400000) : 0;
      return `
        <div class="attention-row">
          <div>
            <div class="att-name">${r.name||'—'}</div>
            ${r.company ? `<div class="att-company">${r.company}</div>` : ''}
          </div>
          <div class="pill pill-rose">${diff > 0 ? diff+'d late' : 'today'}</div>
        </div>
      `;
    }).join('');
  }

  // Table
  if (active.length === 0) {
    document.getElementById('tbl-body').innerHTML = '<tr><td colspan="7"><div class="empty">No active deals</div></td></tr>';
  } else {
    document.getElementById('tbl-body').innerHTML = active.map(r => `
      <tr>
        <td>
          <div style="font-weight:500;font-size:12px">${r.name||'—'}</div>
          ${r.company ? `<div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:1px">${r.company}</div>` : ''}
        </td>
        <td><span class="pill ${STAGE_PILL[r.funnel]||'pill-gray'}">${r.funnel||'—'}</span></td>
        <td>${(r.products||[]).map(p=>`<span class="product-chip">${p}</span>`).join('')||'<span style="color:rgba(255,255,255,0.2)">—</span>'}</td>
        <td class="value">${rm(r.orderValue)}</td>
        <td class="mono">${r.source||'—'}</td>
        <td>${fdate(r.nextFollowup)}</td>
        <td class="mono">${r.salesRep||'—'}</td>
      </tr>
    `).join('');
  }

  const t = new Date();
  document.getElementById('ts').textContent = `${t.toLocaleDateString('en-MY',{day:'numeric',month:'short'})} · ${t.toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'})}`;
}

async function load() {
  try {
    const pages = await fetchAll();
    const records = parse(pages);
    render(records);
  } catch(e) {
    console.error(e);
    // fallback demo
    render([
      {name:'Ahmad Firdaus',company:'Kopi Satu',funnel:'Negotiation',orderValue:12500,source:'Referral',nextFollowup:new Date(Date.now()-86400000).toISOString(),lastContacted:new Date().toISOString(),salesRep:'Sales Rep A',products:['Paper Cup','Takeaway Box'],needsAttention:true},
      {name:'Siti Nurhaliza',company:'Café Mentari',funnel:'Proposal Sent',orderValue:8200,source:'Instagram',nextFollowup:new Date(Date.now()+86400000).toISOString(),lastContacted:new Date().toISOString(),salesRep:'Sales Rep B',products:['Plastic Cup'],needsAttention:false},
      {name:'Raj Kumar',company:'TehTarik Express',funnel:'Qualified',orderValue:5800,source:'Facebook Ads',nextFollowup:new Date(Date.now()-2*86400000).toISOString(),lastContacted:new Date().toISOString(),salesRep:'Sales Rep A',products:['Paper Cup'],needsAttention:true},
      {name:'Mei Ling',company:'Bubble Co.',funnel:'Contacted',orderValue:3400,source:'Walk-in',nextFollowup:new Date(Date.now()+2*86400000).toISOString(),lastContacted:new Date().toISOString(),salesRep:'Sales Rep C',products:['Plastic Cup'],needsAttention:false},
      {name:'Zulkifli Hassan',company:'Restoran Warisan',funnel:'Lead',orderValue:6700,source:'TikTok',nextFollowup:new Date(Date.now()+3*86400000).toISOString(),lastContacted:new Date().toISOString(),salesRep:'Sales Rep B',products:['Pizza Box'],needsAttention:false},
      {name:'Priya Pillai',company:'Smoothie Bar',funnel:'Closed-Won',orderValue:9100,source:'Referral',nextFollowup:null,lastContacted:new Date().toISOString(),salesRep:'Sales Rep A',products:['Plastic Cup'],needsAttention:false},
      {name:'Hafiz Azman',company:'Makan Corner',funnel:'Closed-Won',orderValue:4500,source:'Facebook Ads',nextFollowup:null,lastContacted:new Date().toISOString(),salesRep:'Sales Rep B',products:['Takeaway Box'],needsAttention:false},
    ]);
  }
}

load();
</script>
</body>
</html>
